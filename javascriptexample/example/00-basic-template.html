<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자바스크립트 실습 기본 탬플릿</title>
    <link rel="stylesheet" href="../css/common.css">
    <!-- defer를 사용하여 HTML 요소가 모두 준비된 뒤 외부 JS가 실행되도록 설정-->
    <script src="../js/파일명.js" defer></script>
</head>
<body>
    <header class="page-header">
        <p class="chapter">JavaScript</p>
        <h1>단원 제목</h1>
        <p>이 페이지에서 실습할 내용을 간단히 설명한다.</p>
    </header>

    <main>
        <section class="lesson-section">
            <h2>소제목</h2>
            <p>개념 설명을 작성한다.</p>

            <pre><code>예제 코드를 작성한다.</code></pre>

            <div class="example-box">
                <p class="example-title">실행 예제</p>
                <button type="button" onclick="함수명()">확인하기</button>
                <div id="result" class="output-box">결과가 이곳에 출력된다.</div>
            </div>

        </section>
    </main>
</body>
</html>
