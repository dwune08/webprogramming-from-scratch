<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카드 목록 예제</title>
    <link rel="stylesheet" href="../css/exam23_flex_card.css">
</head>
<body>
    <h1>웹 개발 학습 과정</h1>

    <div class="card-list">
        <div class="card">
            <h2>HTML</h2>
            <p>
                HTML은 웹 페이지의 구조를 만드는 언어이다.
                제목, 문단, 목록, 이미지, 링크 등을 작성할 수 있다.
            </p>
        </div>

        <div class="card">
            <h2>CSS</h2>
            <p>
                CSS는 웹 피이지의 디자인을 담당하느 언어이다.
                색상, 글꼴, 여백, 배치 등을 설정할 수 있다.
            </p>
        </div>

        <div class="card">
            <h2>JavaScript</h2>
            <p>
                JavaScript는 웹 페이지에 동작을 추가하는 언어이다.
                버튼 클릭, 입력값 처리, 화면 변경 등을 구현할 수 있다.
            </p>
        </div>
    </div>
</body>
</html>
