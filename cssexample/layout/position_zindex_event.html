<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>행사 홍보 페이지</title>
    <link rel="stylesheet" href="../css/position_zindex_event.css">
</head>
<body>
    <div class="event-card">
        <div class="badge">신청 접수중</div>

        <h1 class="event-title">가을 문화 체험 행사</h1>

        <p class="event-desc">
            지역 주민을 위한 가을 문화 체험 행사가 진행된다.
            공예 체험, 음악 공연, 전시 관람 등 다양한 프로그램을 통해
            문화 생활을 즐길 수 있다.
        </p>

        <div class="circle"></div>
    </div>

    <a href="#" class="quick-button">신청하기</a>
</body>
</html>
