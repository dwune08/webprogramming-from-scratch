<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Image Gallery</title>
    <link rel="stylesheet" href="../css/exam28_grid_gallery.css">
</head>
<body>
    <h1>Grid 이미지 갤러리</h1>
    <p class="desc">
        Grid Layout을 사용하여 이미지의 크기가 서로 다른 갤러리를 구성한 예제입니다.
    </p>

    <div class="gallery-container">
        <div class="gallery-item">
            <img src="../image/bear.jpg" alt="곰 이미지">
        </div>

        <div class="gallery-item big">
            <img src="../image/cat.gif" alt="고양지 이미지">
        </div>

        <div class="gallery-item">
            <img src="../image/photo.jpg" alt="풍경 이미지">
        </div>

        <div class="gallery-item tall">
            <img src="../image/bg.jpg" alt="배경 이미지">
        </div>
        
        <div class="gallery-item tall">
            <img src="../image/pic2.jpg" alt="사진 이미지">
        </div>

        <div class="gallery-item wide">
            <img src="../image/guitar-bg.jpg" alt="기타 이미지">
        </div>

        <div class="gallery-item big">
            <img src="../image/pic1.jpg" alt="사진 이미지">
        </div>

        <div class="gallery-item big">
            <img src="../image/photo.avif" alt="사진 이미지">
        </div>
        
    </div>

</body>
</html>
