<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex 메뉴 예제</title>
    <link rel="stylesheet" href="../css/exam22_flex_menu.css">
</head>
<body>
    <header>
        <h1>웹 개발 학습 페이지</h1>
        <p>HTML, CSS, JavaScript를 학습하는 공간입니다.</p>
    </header>

    <nav>
        <a href="#">HTML</a>
        <a href="#">CSS</a>
        <a href="#">JavaScript</a>
        <a href="#">Project</a>
    </nav>

    <main>
        <h2>Flex 메뉴 설명</h2>
        <p>
            nav 요소에 display: flex를 적용하면 메뉴 항목을 가로 방향으로 배치할 수 있다.
            justify-content: center를 사용하면 메뉴를 가운데 정렬할 수 있고,
            gap 속성을 사용하면 메뉴 사이의 간격을 쉽게 설정할 수 있다.
        </p>
    </main>
    
</body>
</html>
