<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공연 예매 안내</title>
    <link rel="stylesheet" href="../css/display_ticket.css">
</head>
<body>
    <div class="ticket-box">
        <h1>주말 음악회 예매 안내</h1>

        <span class="tag">클래식</span>
        <span class="tag">주말 공연</span>
        <span class="tag">전석 지정</span>

        <p class="info">
            이번 공연은 토요일 오후 5시에 시작되며, 공연 시간은 약 90분이다.
            예매자는 공연 시작 20분 전까지 입장해야 한다.
        </p>

        <p class="info">
            좌석은 예매 순서에 따라 선택할 수 있으며, 공연 당일 현장 변경은 어렵다.
        </p>

        <p class="sold-out">
            현재 매진된 공연입니다.
        </p>

        <div class="button-area">
            <a href="#" class="reserve-button">예매하기</a>
        </div>
    </div>
</body>
</html>
