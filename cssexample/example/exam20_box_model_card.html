<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>박스 모델 구조 예제</title>
    <link rel="stylesheet" href="../css/exam20_box_moder_car.css">
</head>
<body>
    <h1>박스 모델 구조 이해하기</h1>

    <div class="box-model">
        <span class="label">margin 영역</span>

        <div class="border-area">
            <span class="label">border 영역</span>

            <div class="padding-area">
                <span class="label">padding 영역</span>

                <div class="content-area">
                    <h2>content 영역</h2>
                    <p>
                        content는 실제 텍스트나 이미지가 표시되는 영역입니다.
                        padding은 콘텐츠와 테두리 사이의 안쪽 여백이고,
                        border는 요소의 테두리입니다.
                    </p>
                    <p>
                        margin은 테두리 바깥쪽 여백으로,
                        다른 요소와의 간격을 만드는 데 사용합니다.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <ul class="info-list">
        <li>margin: 요소 바깥쪽 여백</li>
        <li>border: 요소의 테두리</li>
        <li>padding: 콘텐츠와 테두리 사이의 안쪽 여백</li>
        <li>content: 실제 내용이 표시되는 영역</li>
    </ul>
    
</body>
</html>
