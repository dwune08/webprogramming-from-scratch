<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인라인 스타일</title>
</head>
<body>
    <h1 style="color: #8b5e3c; font-size: 40px;">
        Reading Quotes(독서 명언)
    </h1>

    <p style="font-size: 24px; color: #4a3b2a;">
        책을 가까이 하는 사람은 생각하는 힘을 함께 키웁니다.
    </p>

    <hr />

    <blockquote style="font-size: 28px; color: #b8792f; font-weight: bold; font-style: italic;">
        좋은 책은 조용하지만, <br>
        오래도록 마음속에서 말을 건넵니다.
    </blockquote>
    
    <hr />

    <p style="font-size: 24px; color: #a65f2b; font-weight: bold;">
        오늘의 한 페이지가 내일의 나를 조금 더 성장시킵니다.
    </p>
</body>
</html>
