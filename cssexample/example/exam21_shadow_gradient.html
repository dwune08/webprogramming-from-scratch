<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>그림자와 그래디언트 예제</title>
    <link rel="stylesheet" href="../css/exam21_shadow_gradient.css">
</head>
<body>
    <div class="banner">
        <h1>CSS 고급 스타일 효과</h1>
    </div>

    <div class="content">
        <h2>그림자와 그래디언트</h2>
        <p>
            CSS에서는 text-shadow와 box-shadow를 사용하여 글자와 박스에 그림자 효과를 적용할 수 있다.
            또한 linear-gradient와 radial-gradient를 사용하여 여러 색상이 자연스럽게 이어지는 배경을 만들 수 있다.
        </p>

        <p>
            그림자 효과는 요소를 입체적으로 표현하고, 그래디언트 효과는 배경을 더 부드럽고 세련되게 표현하는 데 사용한다.
        </p>

        <div class="point">
            text-shadow는 글자에, box-shadow는 박스에, gradient는 배경에 적용한다.
        </div>
    </div>
</body>
</html>
