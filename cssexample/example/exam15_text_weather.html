<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>날씨 안내 페이지</title>
    <link rel="stylesheet" href="../css/exam15_text_weather.css">
</head>
<body>
    <h1>오늘의 날씨 안내</h1>

    <div class="weather-card">
        <p class="city">서울</p>

        <p class="summary">
            오늘은 오전에 구름이 많고 오후에는 맑은 날씨가 이어질 예정입니다.
            외출할 때는 가벼운 겉옷을 준비하는 것이 좋습니다. .
        </p>

        <p class="warning">
            일교차가 크므로 건강 관리에 유의하세요.
        </p>

        <p class="english">
            today weather report
        </p>

        <p class="small-text">
            기준 시간: 오전 9시
        </p>
    </div>
</body>
</html>
