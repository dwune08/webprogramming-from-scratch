<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내부 스타일 시트</title>
    <style>
        h1 {
            color: #ad4305;
            font-weight: bold;
            font-family: "Comic Sans MS", "맑은 고딕", sans-serif;
        }
        p {
            font-style: italic;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Reading Quotes(독서 명언)</h1>
    <p>
        책을 읽는 시간은 나를 성장시키는 시간입니다.
    </p>

    <p>
        오늘 읽은 한 문장이 내일의 생각을 바꿀 수 있습니다.
    </p>

    <h1>Learning Quotes(배움 명언)</h1>
    <p>
        배움은 천천히 쌓이지만 오래 남는 힘이 됩니다.
    </p>

    <p>
        모르는 것을 알아 가는 과정이 성작의 시작입니다.
    </p>
    
</body>
</html>
