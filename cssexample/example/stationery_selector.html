<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문구점 상품 목록 페이지</title>
    <link rel="stylesheet" href="../css/stationery_selector.css">
</head>
<body>
    <h2>상품 목록</h2>

    <div class="list">
        <table>
            <thead>
                <tr>
                    <th>상품명</th>
                    <th>가격</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="product">노트</td>
                    <td class="price">1,500원</td>
                </tr>
                <tr class="soldout">
                    <td class="product">볼펜</td>
                    <td class="price">2,000원</td>
                </tr>
                <tr>
                    <td class="product">지우개</td>
                    <td class="price">500원</td>
                </tr>
                <tr class="bargain">
                    <td class="product">필통</td>
                    <td class="price"><del>5,000원</del> 3000원</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
