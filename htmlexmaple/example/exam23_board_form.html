<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 작성</title>
</head>
<body>
    <h1>게시글 작성</h1>
    <p>
        게시판에 등록할 제목과 내용을 작성해 주세요.
    </p>

    <form method="post" enctype="multipart/form-data">
        <fieldset>
            <legend>게시글 정보</legend> 

            <p>
                <label for="title">제목</label>
                <input type="text" id="title" name="title" size="50" placeholder="제목을 입력하세요" required></labeltype>
            </p>

            <p>
                <label for="category">게시글 분류</label>
                <select id="category" name="category">
                    <option value="notice">공지사항</option>
                    <option value="free">자유게시판</option>
                    <option value="qna">질문게시판</option>
                </select>
            </p>

            <p>
                <label for="content">내용</label><br>
                <textarea id="content" name="content" rows="8" cols="60" placeholder="내용을 입력하세요" required></textarea>
            </p>

            <p>
                <label for="uploadFile">첨부 파일</label>
                <input type="file" id="uploadFile" name="uploadFile">
            </p>
        </fieldset>

        <p>
            <button type="submit">등록</button>
            <button type="reset">취소</button>
        </p>
    </form>
    
</body>
</html>
