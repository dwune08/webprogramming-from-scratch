<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미디어 파일 재생하기</title>
</head>
<body>
    <!--내가 가진 미디어 파일 재생하기 -->
    <h3>내가 가진 미디어 파일</h3>

    <h4>🎬 동영상 예제</h4>
    <video width="640" height="360" controls muted>
        <source src="../media/flight.mp4" type="video/mp4">
        사용 중인 브라우저는 video 태그를 지원하지 않습니다.
    </video>

    <h4>🎵 오디오 예제</h4>
    <audio controls>
        <source src="../media/spring.mp3" type="audio/mpeg">
        사용 중인 브라우저는 audio 태그를 지원하지 않습니다.
    </audio>

</body>
</html>
