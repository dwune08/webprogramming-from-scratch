<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상품 안내 페이지</title>
    <style>
        table {
            border-collapse: collapse;
            width: 700px;
        }
        caption {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        th, td {
            border: 1px solid #333;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #f3f3f3;
        }
        </style>
</head>
<body>
    <h1>전자제품 상품 안내</h1>
    <p>
        상품 목록에서 상세 보기를 클릭하면 아래 iframe 영역에 상품 설명이 표시됩니다.
    </p>

    <table>
        <caption>상품 목록</caption>
        <tr>
            <th>이미지</th>
            <th>상품명</th>
            <th>가격</th>
            <th>상세 정보</th>
        </tr>
        <tr>
            <td>
                <img src="../image/laptop.jpg" alt="노트북 이미지" width="120">
            </td>
            <td>노트북</td>
            <td>1,200,000원</td>
            <td>
                <a href="laptop_detail.html" target="detailFrame">상세 보기</a>
            </td>
        </tr>
        <tr>
            <td>
                <img src="../image/tablet.webp" alt="태블릿 이미지" width="120">
            </td>
            <td>태블릿</td>
            <td>700,000원</td>
            <td>
                <a href="tablet_detail.html" target="detailFrame">상세 보기</a>
            </td>
        </tr>
    </table>
    <hr>

    <h2>상품 상세 설명</h2>
    <iframe
        src="laptop_detail.html"
        name="detailFrame"
        title="상품 상세 설명 영역"
        width="700"
        height="300">
    </iframe>
</body>
</html>
