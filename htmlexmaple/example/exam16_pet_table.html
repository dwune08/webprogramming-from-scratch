<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반려동물 소개표</title>
    <style>
        table {
            border-collapse: collapse;
            width: 800px;
        }
        caption {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        th, td {
            border: 1px solid #444;
            padding: 12px;
            text-align: center;
        }
        th {
            background-color: #fff0d9;
        }
        img {
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h1>반려동물 소개</h1>
    <p>
        여러 반려동물의 특징을 이미지와 함께 표로 정리한 페이지입니다.
    </p>

    <table>
        <caption>반려동물 정보표</caption>
        <colgroup>
            <col width = "180">
            <col width = "140">
            <col width = "280">
            <col width = "200">
        </colgroup>
        <thead>
            <tr>
                <th>사진</th>
                <th>동물</th>
                <th>특징</th>
                <th>좋아하는 것</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>
                    <img src="../image/dog.png" alt="강아지 이미지" width="150">
                </td>
                <td>강아지</td>
                <td>사람을 잘 따르고 활발하다.</td>
                <td>산책, 공놀이</td>
            </tr>
            <tr>
                <td>
                    <img src="../image/cat.png" alt="고양이 이미지" width="150">
                </td>
                <td>고양이</td>
                <td>조용하고 독립적인 성향이 있다.</td>
                <td>낮잠, 창밖 보기</td>
            </tr>
            <tr>
                <td>
                    <img src="../image/rabbit.png" alt="토끼 이미지" width="150">
                </td>
                <td>토끼</td>
                <td>귀가 길고 부드러운 털을 가지고 있다.</td>
                <td>당근, 조용한 공간</td>
            </tr>
        </tbody>

    </table>        
</body>
</html>
