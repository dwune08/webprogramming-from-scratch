<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세상 모든 엄마들을 위한 가슴 따뜻한 동화</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #eef6fb;
            color: #2f3a40;
            padding: 50px;
        }
        
        .container {
            max-width: 760px;
            margin: 0 auto;
            background-color: #ffffff;
            border : 2px solid #c9e3f2;
            border-radius: 8px;
            padding: 45px;
        }

        h1 {
            text-align: center;
            color: #4f8fb3;
            margin-bottom: 35px;
            letter-spacing: 1px;
        }

        p {
            font-size: 1.15em;
            border-left: 4px solid #c9e3f2;
            padding-left: 16px;
            margin-bottom: 20px;
        }

        .footer {
            text-align: right;
            margin-top: 40px;
            color: #6f8fa3;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>세상 모든 엄마들을 위한<br>가슴 따뜻한 동화</h1>

        <p>하늘에서 하얀 눈이 펑펑 쏠아지고 있었다 .</p>
        <p>얼룩소가 빨리 나오라는 듯 또 한 번 손짓했다 .</p>
        <p>셋이 위어나가 얼룩소를 에워쌌다 .</p>
        <p>랑이가 얼룩소 볼에 자기 볼을 어루만졌다 .</p>
        <p>얼룩소도 덩달아 신이 나 여기저기 발자국을 남기고 있었다 .</p>
        <p>까르르 웃음소리가 여일당 마당을 가득 채웠다 .</p>

        <div class="footer">따뜻한 하루, 사랑을 담아</div>
</div>
    
</body>
</html>
