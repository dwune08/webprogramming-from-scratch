<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수업 시간표</title>
    <style>
        table {
            border-collapse: collapse;
            width: 800px;
        }
        caption {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        th, td {
            border: 1px solid #333;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <h1>웹 개발 수업 시간표</h1>
    <p>
        이번 주 웹 개발 수업 일정을 표로 정리한 페이지입니다.
    </p>

    <table>
        <caption>주간 수업 시간표</caption>
        <thead>
            <tr>
                <th>시간</th>
                <th>월요일</th>
                <th>화요일</th>
                <th>수요일</th>
                <th>목요일</th>
                <th>금요일</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th>09:00 - 10:00</th>
                <td>HTML 기본 구조</td>
                <td>텍스트 태그</td>
                <td>이미지 태그</td>
                <td>목록 태그</td>
                <td>테이블 태그</td>
            </tr>
            <tr>
                <th>10:00 - 11:00</th>
                <td>실습</td>
                <td>실습</td>
                <td>이미지 페이지 만들기</td>    
                <td>목록 페이지 만들기</td>
                <td>시간표 만들기</td>
            </tr>
            <tr>
                <th>11:00 - 12:00</th>
                <td colspan="5">예제 코드 작성 및 결과 확인</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
