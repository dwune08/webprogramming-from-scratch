<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>산 정보 페이지</title>
    <style>
        table {
            border-collapse: collapse;
            width: 700px;
        }
        th, td {
            border: 1px solid #333;
            padding: 12px;
        }
        th {
            background-color: #f2f2f2;
            width: 160px;
        }
        img {
            width: 100%;
        }
    </style>
</head>
<body>
    <h1>한라산 소개</h1>
    <p>
        우리나라의 댚적인 산 중의 하나인 한라산에 대한 정보를 표로 정리한 페이지입니다.
    </p>

    <table>
        <caption>한라산 기본 정보</caption>
        <tr>
            <td colspan="2">
                <img src="../image/mountain.png" alt="한라산 풍경 이미지">
            </td>
        </tr>
        <tr>
            <td colspan="2">
                한라산은 제주도 중앙에 위치한 산으로, 사계절마다 다른 풍경을 볼 수 있는 아름다운 산입니다.
                정상에는 백록담이 있으며, 많은 사람들이 등산과 자연 경관을 즐기기 위해 찾는 곳입니다.
            </td>
        </tr>
        <tr>
            <th>산 이름</th>
            <td>한라산</td>
        </tr>
        <tr>
            <th>위치</th>
            <td>제주특별자치도</td>
        </tr>
        <tr>
            <th>높이</th>
            <td>1,947m</td>
        </tr>
        <tr>
            <th>대표 볼거리</th>
            <td>백록담, 어리목 탐방로, 성판악 탐방로</td>
        </tr>
        <tr>
            <th>추천 계절</th>
            <td>봄, 가을, 겨울</td>
        </tr>
        <tr>
            <th>특징</th>
            <td>제주도를 대표하는 산이며, 정상에서 아름다운 자연 경관을 볼 수 있습니다.</td>
        </tr>


    </table>
    
</body>
</html>
